---
- name: Sincronizar directorios usando Robocopy
  hosts: all
  tasks:

    - name: Copiar archivos de origen a destino
      ansible.windows.win_shell: robocopy "\\172.25.250.9\test" "C:\Users\devops\Desktop" kvm.iso.gz
      register: result
      changed_when: result.rc == 1
      failed_when: false
      become: yes
      become_method: runas
      become_flags: logon_type=new_credentials logon_flags=netcredentials_only
      vars:
        ansible_become_user: sambauser
        ansible_become_pass: redhat

