---
- name: Copia fichero grande usando samba con win_copy remoto
  hosts: all
  tasks:

    # Revisar - no se puede utilizar con una sesion no interactiva tipo WinRM
    #  - name: Mount Samba share
    #    community.windows.win_mapped_drive:
    #      letter: Z
    #      path: \\172.25.250.9\test
