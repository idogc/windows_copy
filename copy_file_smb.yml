  - name: Copia desde el recurso samba
    ansible.windows.win_copy:
      src: \\172.25.250.9\test\kvm.iso.gz
      dest: C:\Users\student\Desktop\kvm.iso.gz
      remote_src: true
    become: yes
    become_method: runas
    become_flags: logon_type=new_credentials logon_flags=netcredentials_only
    vars:
      ansible_become_user: sambauser
      ansible_become_pass: redhat

